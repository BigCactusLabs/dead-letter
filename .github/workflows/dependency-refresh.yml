name: dependency-refresh

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Refresh lockfile
        run: uv lock --upgrade

      - name: Sync workspace
        run: uv sync --extra dev

      - name: Core tests
        run: uv run pytest -q tests/core

      - name: Backend tests
        run: uv run pytest -q tests/backend

      - name: Frontend tests
        run: node --test tests/frontend/app.test.js

      - name: Frontend syntax
        run: node --check src/dead_letter/frontend/static/app.js

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          branch: chore/dependency-refresh
          commit-message: "chore(deps): refresh uv lock"
          title: "chore(deps): refresh uv lock"
          body: |
            Weekly transitive dependency refresh generated by the scheduled workflow.
          add-paths: |
            uv.lock
